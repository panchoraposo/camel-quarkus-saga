# Quarkus
%dev.quarkus.http.port=8083
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.log.level=INFO
quarkus.log.category."org.apache".level=INFO

# JSON logs (structured)
%dev.quarkus.log.console.json.enabled=false
%test.quarkus.log.console.json.enabled=false
%demo.quarkus.log.console.json.enabled=true
%prod.quarkus.log.console.json.enabled=true

# Metrics (Prometheus)
%demo.quarkus.micrometer.export.prometheus.enabled=true
%prod.quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# Auth (Keycloak / OIDC)
%dev.quarkus.oidc.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080/realms/ticketblaster}
%demo.quarkus.oidc.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL:http://keycloak-service.keycloak.svc.cluster.local:8080/realms/ticketblaster}
%prod.quarkus.oidc.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL:http://keycloak-service.keycloak.svc.cluster.local:8080/realms/ticketblaster}
quarkus.oidc.client-id=frontend
quarkus.oidc.application-type=service
quarkus.oidc.token.principal-claim=preferred_username

quarkus.http.auth.permission.authenticated.paths=/order,/users/me
quarkus.http.auth.permission.authenticated.policy=authenticated

# Admin-only endpoints
quarkus.http.auth.permission.admin.paths=/orders,/orders/*
quarkus.http.auth.permission.admin.policy=admin-policy
quarkus.http.auth.policy.admin-policy.roles-allowed=admin

# Dev Services Kafka
%dev.quarkus.devservices.enabled=true
%dev.quarkus.kafka.devservices.shared=true
%dev.quarkus.kafka.devservices.service-name=kafka-cluster
%dev.quarkus.kafka.devservices.port=9092
%dev.quarkus.kafka.devservices.provider=redpanda

%dev.bootstrap.servers=localhost:9092
%test.quarkus.devservices.enabled=true
%test.quarkus.kafka.devservices.shared=true
%test.quarkus.kafka.devservices.service-name=kafka-cluster
%test.quarkus.kafka.devservices.port=9092
%test.quarkus.kafka.devservices.provider=redpanda

%test.bootstrap.servers=localhost:9092
bootstrap.servers=demo-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092
camel.component.kafka.brokers=${bootstrap.servers}

# Apicurio Registry (Avro SerDes for Kafka events)
apicurio.registry.url=http://apicurio-service.apicurio-registry.svc.cluster.local:8080/apis/registry/v2
camel.component.kafka.configuration.keySerializer=org.apache.kafka.common.serialization.StringSerializer
camel.component.kafka.configuration.keyDeserializer=org.apache.kafka.common.serialization.StringDeserializer
camel.component.kafka.configuration.valueSerializer=io.apicurio.registry.serde.avro.AvroKafkaSerializer
camel.component.kafka.configuration.valueDeserializer=io.apicurio.registry.serde.avro.AvroKafkaDeserializer
camel.component.kafka.configuration.additionalProperties[apicurio.registry.url]=${apicurio.registry.url}
camel.component.kafka.configuration.additionalProperties[apicurio.registry.auto-register]=true
camel.component.kafka.configuration.additionalProperties[apicurio.registry.use-specific-avro-reader]=true

# Hibernate ORM
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%demo.quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.format-sql=true
quarkus.hibernate-orm.log.sql=true
%demo.quarkus.hibernate-orm.sql-load-script=import.sql

# Datasource
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.devservices.db-name=orders
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://orders:5432/orders
%prod.quarkus.datasource.db-kind=postgresql
%demo.quarkus.datasource.jdbc.url=jdbc:postgresql://orders:5432/orders
%demo.quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.database.version-check.enabled=false
quarkus.datasource.username=quarkus
quarkus.datasource.password=quarkus

# OpenAPI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# SQL
sql.insertOrder=INSERT INTO order_table (userId, orderId, seatId, orderStatus, orderMessage) VALUES (:#userId, :#orderId, :#seatId, :#orderStatus, :#orderMessage)
sql.updateOrder=UPDATE order_table SET paymentId = :#paymentId, orderStatus = :#orderStatus, orderMessage = :#orderMessage, paymentStatus = :#paymentStatus, paymentMessage = :#paymentMessage, date = :#date, seatStatus = :#seatStatus, seatMessage = :#seatMessage, price = :#price WHERE orderid = :#orderId
sql.updateOrderSeat=UPDATE order_table SET seatStatus = :#seatStatus, seatMessage = :#seatMessage WHERE orderid = :#orderId

# JIB
quarkus.container-image.builder=jib
quarkus.container-image.push=true
quarkus.container-image.registry=quay.io
quarkus.container-image.group=fraposo
quarkus.container-image.name=order
quarkus.container-image.tag=0.7-native
#quarkus.jib.base-jvm-image=registry.redhat.io/ubi9/openjdk-21:latest
quarkus.native.container-build=true
quarkus.jib.base-native-image=registry.redhat.io/ubi10/ubi-minimal:latest

# Opentelemetry (fully configured later via GitOps/env)
quarkus.otel.sdk.disabled=true
quarkus.otel.metrics.enabled=false