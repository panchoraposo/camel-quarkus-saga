- beans:
  - name: postgresDS
    type: org.postgresql.ds.PGSimpleDataSource
    properties:
      url: "{{kaoto.db.url}}"
      user: "{{kaoto.db.user}}"
      password: "{{kaoto.db.password}}"

- route:
    id: kaoto-postgres-http
    from:
      # Use HTTP POST with XML payload, returns JSON.
      uri: netty-http:http://0.0.0.0:8080/kaoto/demo
      parameters:
        httpMethodRestrict: POST
      steps:
        - to:
            uri: direct:process-xml
        - setHeader:
            name: Content-Type
            constant: application/json

- route:
    id: kaoto-postgres-sample-timer
    from:
      uri: timer:kaoto-postgres-demo
      parameters:
        period: 8000
      steps:
        - setBody:
            simple: |
              <order>
                <eventType>OrderCreated</eventType>
                <userId>123</userId>
                <seatId>A-1</seatId>
                <price>50.0</price>
              </order>
        - to:
            uri: direct:process-xml
        - log:
            message: "JSON out: ${body}"

- route:
    id: kaoto-postgres-process-xml
    from:
      uri: direct:process-xml
      steps:
        # Keep a copy of the raw XML for storage/debugging
        - setHeader:
            name: sourceXml
            simple: "${body}"

        # Ensure table/schema exists (idempotent even if an older version exists)
        - to:
            uri: sql:CREATE TABLE IF NOT EXISTS kaoto_demo (id SERIAL PRIMARY KEY, created_at TIMESTAMP DEFAULT NOW())
            parameters:
              dataSource: "#postgresDS"
        - to:
            uri: sql:ALTER TABLE kaoto_demo ADD COLUMN IF NOT EXISTS event_type TEXT
            parameters:
              dataSource: "#postgresDS"
        - to:
            uri: sql:ALTER TABLE kaoto_demo ADD COLUMN IF NOT EXISTS user_id BIGINT
            parameters:
              dataSource: "#postgresDS"
        - to:
            uri: sql:ALTER TABLE kaoto_demo ADD COLUMN IF NOT EXISTS seat_id TEXT
            parameters:
              dataSource: "#postgresDS"
        - to:
            uri: sql:ALTER TABLE kaoto_demo ADD COLUMN IF NOT EXISTS price NUMERIC
            parameters:
              dataSource: "#postgresDS"
        - to:
            uri: sql:ALTER TABLE kaoto_demo ADD COLUMN IF NOT EXISTS source_xml TEXT
            parameters:
              dataSource: "#postgresDS"

        # Extract fields from XML using XPath (requires camel-xpath)
        - setHeader:
            name: eventType
            xpath:
              expression: /order/eventType/text()
              resultType: java.lang.String
        - setHeader:
            name: userId
            xpath:
              expression: /order/userId/text()
              resultType: java.lang.Long
        - setHeader:
            name: seatId
            xpath:
              expression: /order/seatId/text()
              resultType: java.lang.String
        - setHeader:
            name: price
            xpath:
              expression: /order/price/text()
              resultType: java.math.BigDecimal

        # Insert into Postgres (requires camel-sql)
        - to:
            uri: sql:INSERT INTO kaoto_demo (event_type, user_id, seat_id, price, source_xml) VALUES (:#eventType, :#userId, :#seatId, :#price, :#sourceXml)
            parameters:
              dataSource: "#postgresDS"

        # Read back latest rows and output JSON (requires camel-jackson)
        - to:
            uri: sql:SELECT id, event_type, user_id, seat_id, price, created_at FROM kaoto_demo ORDER BY id DESC LIMIT 5
            parameters:
              dataSource: "#postgresDS"
        - marshal:
            json:
              library: Jackson

