- beans:
  - name: postgresDS
    type: org.postgresql.ds.PGSimpleDataSource
    properties:
      url: "{{kaoto.db.url}}"
      user: "{{kaoto.db.user}}"
      password: "{{kaoto.db.password}}"

- route:
    id: kaoto-postgres-http
    from:
      # Use HTTP POST with XML payload, returns JSON.
      uri: netty-http:http://0.0.0.0:8080/kaoto/demo
      parameters:
        httpMethodRestrict: POST
      steps:
        - to:
            uri: direct:process-xml
        - setHeader:
            name: Content-Type
            constant: application/json

- route:
    id: kaoto-postgres-sample-timer
    from:
      uri: timer:kaoto-postgres-demo
      parameters:
        period: 8000
      steps:
        - setBody:
            simple: |
              <reading>
                <sensorId>S-100</sensorId>
                <location>lab</location>
                <tempC>23.7</tempC>
                <humidity>45.2</humidity>
              </reading>
        - to:
            uri: direct:process-xml
        - log:
            message: |
              JSON out (pretty):
              ${body}

- route:
    id: kaoto-postgres-process-xml
    from:
      uri: direct:process-xml
      steps:
        # Keep a copy of the raw XML for storage/debugging
        - setHeader:
            name: sourceXml
            simple: "${body}"
        - log:
            message: |
              XML in:
              ${header.sourceXml}

        # Keep the demo visually simple: use a dedicated table so we don't need ALTER chains.
        - to:
            uri: sql:CREATE TABLE IF NOT EXISTS kaoto_readings (id SERIAL PRIMARY KEY, sensor_id TEXT NOT NULL, location TEXT, temp_c NUMERIC, humidity NUMERIC, source_xml TEXT, created_at TIMESTAMP DEFAULT NOW())
            parameters:
              dataSource: "#postgresDS"
        - to:
            uri: sql:ALTER TABLE kaoto_readings ADD COLUMN IF NOT EXISTS mapped_json TEXT
            parameters:
              dataSource: "#postgresDS"

        # Extract fields from XML using XPath (requires camel-xpath)
        - setHeader:
            name: sensorId
            xpath:
              expression: /reading/sensorId/text()
              resultType: java.lang.String
        - setHeader:
            name: location
            xpath:
              expression: /reading/location/text()
              resultType: java.lang.String
        - setHeader:
            name: tempC
            xpath:
              expression: /reading/tempC/text()
              resultType: java.math.BigDecimal
        - setHeader:
            name: humidity
            xpath:
              expression: /reading/humidity/text()
              resultType: java.math.BigDecimal

        # Data mapping / canonical model
        # Keep it as a single visual step: XSLT transforms the XML body into a canonical JSON document.
        - to:
            uri: xslt-saxon:classpath:mappings/reading-to-canonical-json.xsl
        - setHeader:
            name: mappedJson
            simple: "${body}"
        - log:
            message: |
              Mapped JSON (canonical):
              ${header.mappedJson}

        # Insert into Postgres (requires camel-sql)
        - to:
            uri: sql:INSERT INTO kaoto_readings (sensor_id, location, temp_c, humidity, source_xml, mapped_json) VALUES (:#sensorId, :#location, :#tempC, :#humidity, :#sourceXml, :#mappedJson)
            parameters:
              dataSource: "#postgresDS"

        # Read back latest rows and output JSON (requires camel-jackson)
        - to:
            uri: sql:SELECT id, sensor_id, location, temp_c, humidity, mapped_json, created_at FROM kaoto_readings ORDER BY id DESC LIMIT 5
            parameters:
              dataSource: "#postgresDS"
        - marshal:
            json:
              library: Jackson
              prettyPrint: true
        - log:
            message: |
              JSON out (pretty):
              ${body}

