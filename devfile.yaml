schemaVersion: 2.2.2
metadata:
  name: camel-quarkus-saga
  displayName: TicketBlaster Live (Kaoto + Camel JBang)
  description: DevSpaces workspace preconfigured for Kaoto + Camel JBang route testing.
  tags:
    - kaoto
    - camel
    - jbang
    - postgres
  projectType: kubernetes

components:
  - name: tools
    container:
      image: quay.io/devfile/universal-developer-image:latest
      cpuLimit: "2"
      memoryLimit: 4Gi
      cpuRequest: "500m"
      memoryRequest: 1Gi
      mountSources: true
      env:
        - name: JAVA_HOME
          value: /usr/lib/jvm/java-17
        # DB defaults for kaoto-postgres-demo/
        - name: KAOTO_DB_USER
          value: kaoto
        - name: KAOTO_DB_PASSWORD
          value: kaoto

commands:
  - id: 01-install-jbang
    exec:
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: |
        # NOTE: Dev Spaces runs this using /bin/sh -c (not bash).
        # Keep this command POSIX-compatible and never fail the workspace start.
        set -eu

        if command -v jbang >/dev/null 2>&1; then
          echo "JBang already installed."
          exit 0
        fi

        echo "Installing JBang..."
        if command -v curl >/dev/null 2>&1; then
          if curl -fsSL https://sh.jbang.dev | bash -s - app setup; then
            :
          else
            echo "WARNING: JBang install script failed. IDE will still start; run install manually in a terminal."
            exit 0
          fi
        else
          echo "WARNING: curl is not available in the workspace image. IDE will still start."
          exit 0
        fi

        if [ -x "$HOME/.jbang/bin/jbang" ]; then
          "$HOME/.jbang/bin/jbang" --version || true
        fi

  - id: 02-install-camel-cli
    exec:
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: |
        # POSIX + never fail workspace start.
        set -eu

        if command -v camel >/dev/null 2>&1; then
          echo "Camel CLI already installed."
          exit 0
        fi

        if [ -x "$HOME/.jbang/bin/jbang" ]; then
          echo "Installing Camel JBang CLI..."
          if "$HOME/.jbang/bin/jbang" app install camel@apache/camel; then
            :
          else
            echo "WARNING: Camel CLI install failed. IDE will still start; run install manually in a terminal."
            exit 0
          fi
        else
          echo "WARNING: JBang is not installed yet. IDE will still start."
          exit 0
        fi

        if [ -x "$HOME/.jbang/bin/camel" ]; then
          "$HOME/.jbang/bin/camel" --version || true
        fi

  - id: 03-run-kaoto-postgres-demo
    exec:
      component: tools
      workingDir: ${PROJECT_SOURCE}/kaoto-postgres-demo
      commandLine: |
        set -eu

        CAMEL_BIN="$HOME/.jbang/bin/camel"
        if [ ! -x "$CAMEL_BIN" ]; then
          echo "ERROR: camel CLI not found at $CAMEL_BIN. Run commands 01 and 02 first."
          exit 1
        fi

        "$CAMEL_BIN" run routes/kaoto-postgres.camel.yaml \
          --properties=application.properties \
          --dep org.postgresql:postgresql:42.7.3 \
          --dep org.apache.camel:camel-sql

events:
  postStart:
    - 01-install-jbang
    - 02-install-camel-cli

